name: Sync dbt docs

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCS_REMOTE: https://github.com/dbt-labs/docs.getdbt.com.git
  DOCS_CLONE_DIR: ${{ github.workspace }}/docs.getdbt.com
  BUILD_DOCS_DIR: ${{ github.workspace }}/dbt-docs-patcher/docs

jobs:
  sync:
    name: Sync dbt docs
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          path: ${{ github.workspace }}/dbt-docs-patcher
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone docs.getdbt.com
        run: git clone --depth 1 --quiet "$DOCS_REMOTE" "$DOCS_CLONE_DIR"

      - name: Restore docs.getdbt.com node_modules cache
        id: cache-node-modules-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DOCS_CLONE_DIR }}/website/node_modules
          key: docs-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules-restore.outputs.cache-hit != 'true'
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        run: npm install

      - name: Save node_modules to cache
        if: always() && steps.cache-node-modules-restore.outputs.cache-hit != 'true'
        id: cache-node-modules-save
        uses: actions/cache/save@v4
        with:
          path: ${{ env.DOCS_CLONE_DIR }}/website/node_modules
          key: docs-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Patch Docusaurus
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        run: |
          # Disable buildRawMarkdownData (raw MDX source .md files) and enable
          # llms-txt per-page .md generation (derived from rendered HTML, so
          # partials are inlined and components like <FAQ> are expanded).
          sed -i 's|path.resolve("plugins/buildRawMarkdownData"),|// path.resolve("plugins/buildRawMarkdownData"),|' docusaurus.config.js
          sed -i 's/enableMarkdownFiles: false/enableMarkdownFiles: true/' docusaurus.config.js

          # Downgrade broken-link errors to warnings so the build completes even
          # when version-filtered pages are absent for a given build pass.
          sed -i 's/onBrokenLinks: "throw"/onBrokenLinks: "warn"/' docusaurus.config.js
          sed -i 's/onBrokenMarkdownLinks: "throw"/onBrokenMarkdownLinks: "warn"/' docusaurus.config.js

          # Remove the loading guard from VersionBlock so SSR renders version-
          # appropriate content. Without this, VersionBlock returns null during
          # static builds and all version-gated content is absent.
          node - <<'EOF'
          const fs = require('fs');
          let src = fs.readFileSync('src/components/versionBlock/index.js', 'utf8');
          src = src.replace(
            "import React, { useState, useEffect, useContext } from 'react'",
            "import React, { useContext } from 'react'"
          );
          src = src.replace('\n  const [loading, setLoading] = useState(true);\n', '\n');
          src = src.replace(
            '\n  // Hide until version is resolved from context (prevents hydration mismatch)\n  useEffect(() => {\n    version && setLoading(false);\n  }, [version]);\n',
            '\n'
          );
          src = src.replace('return loading ? null : <>{children}</>;', 'return <>{children}</>;');
          fs.writeFileSync('src/components/versionBlock/index.js', src);
          console.log('Patched VersionBlock');
          EOF

      - name: Build version docs
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        env:
          SKIP_LINK_CHECK: "true"
          DOCS_ENV: build
        run: |
          # Derive version -> default subProduct mapping directly from dbt-versions.js.
          # Picks the first non-beta subProduct for each unique version, matching the
          # same logic as getDefaultSubProductName() in VersionContext.js.
          declare -A SUBPRODUCTS
          VERSIONS=()
          while IFS=$'\t' read -r version subproduct; do
            SUBPRODUCTS["$version"]="$subproduct"
            VERSIONS+=("$version")
          done < <(node - <<'JSEOF'
          const { products } = require('./dbt-versions');
          const seen = new Set();
          for (const product of products) {
            for (const sp of product.subProducts) {
              if (!sp.isBeta && !seen.has(sp.version)) {
                seen.add(sp.version);
                process.stdout.write(sp.version + '\t' + sp.name + '\n');
              }
            }
          }
          JSEOF
          )
          echo "Versions to build: ${VERSIONS[*]}"

          rm -rf "$BUILD_DOCS_DIR"
          mkdir -p "$BUILD_DOCS_DIR"
          touch "$BUILD_DOCS_DIR/.gitkeep"

          for VERSION in "${VERSIONS[@]}"; do
            SUBPRODUCT="${SUBPRODUCTS[$VERSION]}"
            echo "--- Building version $VERSION (subProduct: $SUBPRODUCT) ---"

            # Restore VersionContext.js then set the desired default subProduct so
            # that SSR renders version-appropriate content for this build pass.
            git checkout -- src/stores/VersionContext.js
            SUBPRODUCT="$SUBPRODUCT" python3 - <<'PYEOF'
          import os
          with open('src/stores/VersionContext.js') as f:
              content = f.read()
          content = content.replace(
              'const defaultSubProductName = getDefaultSubProductName();',
              'const defaultSubProductName = "' + os.environ['SUBPRODUCT'] + '";'
          )
          with open('src/stores/VersionContext.js', 'w') as f:
              f.write(content)
          print('Patched VersionContext for', os.environ['SUBPRODUCT'])
          PYEOF

            npm exec -- docusaurus clear
            npm run build -- --no-minify

            DEST="$BUILD_DOCS_DIR/$VERSION"
            mkdir -p "$DEST"
            rsync -a -m --include='*/' --include='*.md' --exclude='*' build/ "$DEST/"

            md_count=$(find "$DEST" -type f -name "*.md" | wc -l)
            echo "Copied $md_count markdown files to docs/$VERSION/"
          done

      - name: Commit and push to main
        working-directory: ${{ github.workspace }}/dbt-docs-patcher
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            timestamp=$(TZ='UTC' date +'%Y_%m_%d__%H_%M_%S')
            git commit -m "Regenerate dbt documentation as of $timestamp"
            git push origin main
          fi
