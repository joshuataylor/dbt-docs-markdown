name: Sync dbt docs

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCS_REMOTE: https://github.com/dbt-labs/docs.getdbt.com.git
  DOCS_CLONE_DIR: ${{ github.workspace }}/docs.getdbt.com

jobs:
  # Update the upstream clone once, record the commit range, and derive the list
  # of (product, version, subProduct) builds. The .git cache saved here is reused
  # by every build shard so they all build the exact same upstream commit.
  prepare:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      upstream_sha: ${{ steps.update.outputs.upstream_sha }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore docs.getdbt.com git cache
        id: cache-docs-restore
        uses: actions/cache/restore@v6
        with:
          # Cache only .git -- the working tree is rebuilt from it via reset --hard,
          # which keeps the cache small (no build artifacts or checked-out files).
          path: ${{ env.DOCS_CLONE_DIR }}/.git
          # Cache keys are immutable, so save under a per-run key and restore the
          # most recent one via the shared prefix.
          key: docs-getdbt-git-${{ github.run_id }}
          restore-keys: docs-getdbt-git-

      - name: Clone or update docs.getdbt.com and record commit range
        id: update
        run: |
          if [[ -d "$DOCS_CLONE_DIR/.git" ]]; then
            # Cache hit: only .git was restored. Its HEAD is the last sync baseline.
            cd "$DOCS_CLONE_DIR"
            last_synced_sha=$(git rev-parse HEAD)
            git fetch --quiet origin
            # reset --hard rebuilds the working tree from the cached .git, then advances to upstream.
            git reset --hard --quiet '@{u}'
            git clean -fdq
          else
            # Cold cache / first run: full clone, no baseline to diff against.
            git clone --quiet "$DOCS_REMOTE" "$DOCS_CLONE_DIR"
            cd "$DOCS_CLONE_DIR"
            last_synced_sha=""
          fi
          upstream_sha=$(git rev-parse HEAD)
          echo "Last synced upstream SHA: ${last_synced_sha:-<none>}"
          echo "Current upstream SHA:     $upstream_sha"
          # Pin the SHA so every build shard resets to the same commit even if
          # upstream moves while the matrix is running.
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

          # Build the commit log for the message body. Each line: short SHA + subject.
          {
            echo "Upstream docs.getdbt.com changes since last sync:"
            echo
            if [[ -z "$last_synced_sha" ]]; then
              echo "(no recorded baseline -- listing latest 20 upstream commits)"
              git log --no-merges --max-count=20 --pretty=format:'- %h %s' "$upstream_sha"
              echo
            elif [[ "$last_synced_sha" == "$upstream_sha" ]]; then
              echo "(no new upstream commits -- rebuild only)"
            else
              git log --no-merges --pretty=format:'- %h %s' "${last_synced_sha}..${upstream_sha}"
              echo
            fi
          } > "$RUNNER_TEMP/upstream-changes.txt"

          echo "--- Commit body preview ---"
          cat "$RUNNER_TEMP/upstream-changes.txt"

      - name: Save docs.getdbt.com git cache
        uses: actions/cache/save@v6
        with:
          path: ${{ env.DOCS_CLONE_DIR }}/.git
          key: docs-getdbt-git-${{ github.run_id }}

      - name: Derive build matrix
        id: matrix
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        run: |
          # Derive (version, product name, subProduct) from dbt-versions.js.
          # For each product, picks the first non-beta subProduct per version (falling
          # back to the first beta if no non-beta exists for that product+version).
          # This mirrors resolveSubProductFromProductAndVersion() in VersionContext.js.
          matrix=$(node - <<'JSEOF'
          const { products } = require('./dbt-versions');
          const out = [];
          for (const product of products) {
            const versionsSeen = new Set();
            for (const sp of product.subProducts) {
              if (versionsSeen.has(sp.version)) continue;
              versionsSeen.add(sp.version);
              const chosen = product.subProducts.find(s => s.version === sp.version && !s.isBeta) || sp;
              out.push({
                name: product.name.toLowerCase(),
                version: sp.version.replace(/\./g, '_'),
                subproduct: chosen.name,
              });
            }
          }
          process.stdout.write(JSON.stringify(out));
          JSEOF
          )
          echo "Build matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Upload commit-range notes
        uses: actions/upload-artifact@v7
        with:
          name: upstream-changes
          path: ${{ runner.temp }}/upstream-changes.txt
          retention-days: 1

  # One shard per (product, version). Each rebuilds the working tree from the
  # shared .git cache at the pinned SHA, then runs a single Docusaurus build.
  build:
    name: Build ${{ matrix.build.name }} ${{ matrix.build.version }}
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore docs.getdbt.com git cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.DOCS_CLONE_DIR }}/.git
          # Exact hit on the cache prepare just saved for this run.
          key: docs-getdbt-git-${{ github.run_id }}
          restore-keys: docs-getdbt-git-

      - name: Rebuild working tree at pinned SHA
        working-directory: ${{ env.DOCS_CLONE_DIR }}
        env:
          UPSTREAM_SHA: ${{ needs.prepare.outputs.upstream_sha }}
        run: |
          # Normally an exact cache hit already has the pinned commit. If the
          # restore fell back to an older prefix cache, fetch it before resetting.
          if ! git reset --hard --quiet "$UPSTREAM_SHA" 2>/dev/null; then
            git fetch --quiet origin
            git reset --hard --quiet "$UPSTREAM_SHA"
          fi
          git clean -fdq

      - name: Cache docs.getdbt.com node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: ${{ env.DOCS_CLONE_DIR }}/website/node_modules
          key: docs-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        run: npm install

      - name: Patch Docusaurus
        working-directory: ${{ env.DOCS_CLONE_DIR }}
        run: |
          curl -fsSL \
            "https://github.com/joshuataylor/docs.getdbt.com/compare/dbt-labs:current...feature/markdown-docs-gen.diff" \
            | git apply

      - name: Build version docs
        working-directory: ${{ env.DOCS_CLONE_DIR }}/website
        env:
          SKIP_LINK_CHECK: "true"
          DOCS_ENV: build
          NAME: ${{ matrix.build.name }}
          VERSION: ${{ matrix.build.version }}
          SUBPRODUCT: ${{ matrix.build.subproduct }}
          MD_STAGE: ${{ runner.temp }}/md
        run: |
          echo "--- Building $NAME $VERSION (subProduct: $SUBPRODUCT) ---"

          # Restore VersionContext.js (discarding any patch edits to it) then set the
          # desired default subProduct so SSR renders version- and product-appropriate
          # content for this pass.
          git checkout -- src/stores/VersionContext.js
          python3 - <<'PYEOF'
          import os
          with open('src/stores/VersionContext.js') as f:
              content = f.read()
          content = content.replace(
              'const defaultSubProductName = getDefaultSubProductName();',
              'const defaultSubProductName = "' + os.environ['SUBPRODUCT'] + '";'
          )
          with open('src/stores/VersionContext.js', 'w') as f:
              f.write(content)
          print('Patched VersionContext for', os.environ['SUBPRODUCT'])
          PYEOF

          npm exec -- docusaurus clear
          npm run build -- --no-minify

          DEST="$MD_STAGE/$NAME/$VERSION"
          mkdir -p "$DEST"
          rsync -a -m --include='*/' --include='*.md' --exclude='*' build/ "$DEST/"

          md_count=$(find "$DEST" -type f -name "*.md" | wc -l)
          echo "Copied $md_count markdown files for $NAME/$VERSION"

      - name: Upload markdown
        uses: actions/upload-artifact@v7
        with:
          name: md-${{ matrix.build.name }}-${{ matrix.build.version }}
          path: ${{ runner.temp }}/md
          retention-days: 1
          if-no-files-found: error

  # Merge every shard's markdown into docs/ and push a single commit.
  commit:
    name: Commit and push
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Download commit-range notes
        uses: actions/download-artifact@v8
        with:
          name: upstream-changes
          path: ${{ runner.temp }}

      - name: Reset docs directory
        run: |
          # Rebuild docs/ from scratch so removed upstream pages are dropped
          # (git add -A below stages the deletions).
          rm -rf docs
          mkdir -p docs

      - name: Download markdown shards
        uses: actions/download-artifact@v8
        with:
          pattern: md-*
          merge-multiple: true
          path: docs

      - name: Commit and push to main
        run: |
          touch docs/.gitkeep
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            timestamp=$(TZ='UTC' date +'%Y_%m_%d__%H_%M_%S')
            {
              echo "Regenerate dbt documentation as of $timestamp"
              echo
              cat "$RUNNER_TEMP/upstream-changes.txt"
            } > "$RUNNER_TEMP/commit-message.txt"
            git commit -F "$RUNNER_TEMP/commit-message.txt"
            git push origin main
          fi
